server:
  port: 8080

spring:
  application:
    name: api-gateway

  # =============================================
  # SPRING CLOUD GATEWAY — Definición de Rutas
  # =============================================
  cloud:
    gateway:
      # Habilita integración con Eureka para lb:// URIs
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        # ── MS-USUARIO — Autenticación ──────────────────
        - id: usuario-auth-route
          uri: lb://MS-USUARIO
          predicates:
            - Path=/api/v1/auth/**

        # ── MS-USUARIO — Admin usuarios ─────────────────
        - id: usuario-admin-route
          uri: lb://MS-USUARIO
          predicates:
            - Path=/api/v1/admin/**

        # ── MS-USUARIO — Lookup público ─────────────────
        - id: usuario-public-route
          uri: lb://MS-USUARIO
          predicates:
            - Path=/api/v1/usuarios/**

        # ── MS-ACADÉMICO — Cursos ───────────────────────
        - id: academico-cursos-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/cursos/**

        # ── MS-ACADÉMICO — Asignaturas ──────────────────
        - id: academico-asignaturas-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/asignaturas/**

        # ── MS-ACADÉMICO — Asignación Docente ───────────
        - id: academico-asignacion-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/asignacion-docente/**

        # ── MS-ACADÉMICO — Matrículas ───────────────────
        - id: academico-matriculas-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/matriculas/**

        # ── MS-ACADÉMICO — Calificaciones ───────────────
        - id: academico-calificaciones-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/calificaciones/**

        # ── MS-ACADÉMICO — Notas ────────────────────────
        - id: academico-notas-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/notas/**

        # ── MS-ACADÉMICO — Asistencias ──────────────────
        - id: academico-asistencias-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/asistencias/**

        # ── MS-ACADÉMICO — Estudiantes ──────────────────
        - id: academico-estudiantes-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/estudiantes/**

        # ── MS-ACADÉMICO — Reportes ─────────────────────
        - id: academico-reportes-route
          uri: lb://MS-ACADEMICO
          predicates:
            - Path=/api/v1/reportes/**

        # ── MS-COMUNICACIONES ───────────────────────────
        - id: comunicaciones-route
          uri: lb://MS-COMUNICACIONES
          predicates:
            - Path=/api/v1/comunicaciones/**
          filters:
            - RewritePath=/api/v1/comunicaciones(?<segment>/?.*), /api/comunicaciones${segment}

        # ── MS-ASISTENCIA ───────────────────────────────
        - id: asistencia-route
          uri: lb://MS-ASISTENCIA
          predicates:
            - Path=/api/asistencia/**

        # ── MS-BFF — Backend For Frontend ───────────────
        - id: bff-route
          uri: lb://MS-BFF
          predicates:
            - Path=/api/bff/**

      # =============================================
      # CORS GLOBAL — permite al front (Vite :5173) consumir el Gateway
      # En prod se reemplaza FRONTEND_URL con la URL real del frontend
      # =============================================
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      # Timeout global para todas las rutas
      httpclient:
        connect-timeout: 3000     # 3s para establecer conexión
        response-timeout: 10s     # 10s para recibir respuesta completa

      # Headers de respuesta CORS — deduplica si el MS downstream también los envía
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

    # Desactivar Eureka si no está disponible en dev
    discovery:
      enabled: true

  # Gateway es reactivo (WebFlux) — NO usar spring-web aquí
  main:
    web-application-type: reactive

# =============================================
# EUREKA CLIENT
# =============================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# =============================================
# CONFIGURACIÓN JWT
# =============================================
gateway:
  jwt:
    secret: ${JWT_SECRET:colegio-bernardo-ohiggins-secret-key-2024-duoc-fs3-very-long-secret}

# =============================================
# ACTUATOR
# =============================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, metrics
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# =============================================
# LOGGING
# =============================================
logging:
  level:
    cl.duoc.colegio.gateway: INFO
    org.springframework.cloud.gateway: INFO

---
# =============================================
# PERFIL: docker (docker-compose local)
# Rutas estáticas — sin Eureka, URLs de contenedores
# =============================================
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: docker-academico-cursos
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/cursos/**]

        - id: docker-academico-asignaturas
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/asignaturas/**]

        - id: docker-academico-matriculas
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/matriculas/**]

        - id: docker-academico-calificaciones
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/calificaciones/**]

        - id: docker-academico-notas
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/notas/**]

        - id: docker-academico-asistencias
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/asistencias/**]

        - id: docker-academico-estudiantes
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/estudiantes/**]

        - id: docker-academico-reportes
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/reportes/**]

        - id: docker-academico-asignacion
          uri: http://ms-academico:8082
          predicates: [Path=/api/v1/asignacion-docente/**]

        - id: docker-usuario-auth
          uri: http://ms-usuario:8083
          predicates: [Path=/api/v1/auth/**]

        - id: docker-usuario-admin
          uri: http://ms-usuario:8083
          predicates: [Path=/api/v1/admin/**]

        - id: docker-usuario-public
          uri: http://ms-usuario:8083
          predicates: [Path=/api/v1/usuarios/**]

        - id: docker-comunicaciones
          uri: http://ms-comunicaciones:8081
          predicates: [Path=/api/v1/comunicaciones/**]
          filters:
            - RewritePath=/api/v1/comunicaciones(?<segment>/?.*), /api/comunicaciones${segment}

        - id: docker-asistencia
          uri: http://ms-asistencia:8082
          predicates: [Path=/api/asistencia/**]

        - id: docker-bff
          uri: http://ms-bff:8084
          predicates: [Path=/api/bff/**]

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

logging:
  level:
    cl.duoc.colegio.gateway: DEBUG

---
# =============================================
# PERFIL: dev (desarrollo local)
# =============================================
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    cl.duoc.colegio.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: TRACE

---
# =============================================
# PERFIL: prod (producción — Railway)
# =============================================
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    cl.duoc.colegio.gateway: WARN
    org.springframework.cloud.gateway: WARN
