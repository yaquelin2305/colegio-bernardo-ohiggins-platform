# =============================================
# PERFIL LOCAL — Pruebas sin Eureka
# =============================================
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=dev,local
#
# Apunta directamente a los MSs por IP en lugar de usar lb://
# Ideal para desarrollo local sin servidor Eureka corriendo.

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # MS-Académico — ruta con prefijo /gestion
        - id: academico-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/gestion/**
          filters:
            - RewritePath=/api/v1/gestion/(?<segment>.*), /api/v1/${segment}

        # MS-Académico — rutas directas
        - id: academico-direct-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/estudiantes/**, /api/v1/notas/**, /api/v1/asistencias/**, /api/v1/reportes/**

        # MS-Comunicaciones
        - id: comunicaciones-route
          uri: ${COMUNICACIONES_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/comunicaciones/**
          filters:
            - RewritePath=/api/v1/comunicaciones/(?<segment>.*), /api/${segment}

    # Desactivar service discovery
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
