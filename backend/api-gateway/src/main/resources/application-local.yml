# =============================================
# PERFIL LOCAL — Pruebas sin Eureka
# =============================================
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=dev,local
#
# Apunta directamente a los MSs por IP en lugar de usar lb://
# Ideal para desarrollo local sin servidor Eureka corriendo.

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        # ── MS-Académico — ruta /gestion (legacy) ─────────
        - id: academico-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/gestion/**
          filters:
            - RewritePath=/api/v1/gestion/(?<segment>.*), /api/v1/${segment}

        # ── MS-Académico — rutas directas ─────────────────
        - id: academico-cursos-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/cursos/**

        - id: academico-asignaturas-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/asignaturas/**

        - id: academico-matriculas-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/matriculas/**

        - id: academico-calificaciones-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/calificaciones/**

        - id: academico-asignacion-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/asignacion-docente/**

        - id: academico-direct-route
          uri: ${ACADEMICO_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/estudiantes/**, /api/v1/notas/**, /api/v1/asistencias/**, /api/v1/reportes/**

        # ── MS-Comunicaciones ─────────────────────────────
        - id: comunicaciones-route
          uri: ${COMUNICACIONES_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/comunicaciones/**
          filters:
            - RewritePath=/api/v1/comunicaciones(?<segment>/?.*), /api/comunicaciones${segment}

        # ── MS-Asistencia ─────────────────────────────────
        - id: asistencia-route
          uri: ${ASISTENCIA_URI:http://localhost:8085}
          predicates:
            - Path=/api/asistencia/**

        # ── MS-Usuario — Autenticación y Admin ────────────
        - id: usuario-route
          uri: ${USUARIO_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**

        - id: usuario-admin-route
          uri: ${USUARIO_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/admin/**

        - id: usuario-public-route
          uri: ${USUARIO_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/usuarios/**

        # ── MS-BFF — Backend For Frontend ─────────────────
        - id: bff-route
          uri: ${BFF_URI:http://localhost:8084}
          predicates:
            - Path=/api/bff/**

    # Desactivar service discovery
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
