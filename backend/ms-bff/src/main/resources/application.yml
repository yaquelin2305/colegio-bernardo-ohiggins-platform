server:
  port: 8084

spring:
  application:
    name: ms-bff

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info

---
spring:
  config:
    activate:
      on-profile: local

eureka:
  client:
    enabled: false
