server:
  port: 8084

spring:
  application:
    name: ms-bff

# ── Feign Clients ──────────────────────────────────────────────────────────────
feign:
  academico:
    url: ""   # vacío = usa Eureka; sobreescribir en dev: http://localhost:8082
  usuario:
    url: ""   # vacío = usa Eureka; sobreescribir en dev: http://localhost:8083
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

# ── Eureka ─────────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

---
# Perfil local: URLs directas sin Eureka
spring:
  config:
    activate:
      on-profile: local

feign:
  academico:
    url: "http://localhost:8082"
  usuario:
    url: "http://localhost:8083"

eureka:
  client:
    enabled: false
