# =============================================================
# DOCKER COMPOSE TEST — Plataforma Colegio Bernardo O'Higgins
#
# Incluye ms-mock que suplanta ms-comunicaciones y ms-asistencia.
# Comando único: docker compose -f docker-compose.test.yml up --build
#
# Orden de arranque:
#   postgres → ms-usuario + ms-academico + ms-mock → ms-bff → api-gateway → frontend
# =============================================================

services:

  # ─────────────────────────────────────────────────────────
  # POSTGRES
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: colegio-db
    environment:
      POSTGRES_DB: colegio_db
      POSTGRES_USER: colegio
      POSTGRES_PASSWORD: colegio123
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colegio -d colegio_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # MS-MOCK — Suplanta ms-comunicaciones (:8085) y ms-asistencia
  # ─────────────────────────────────────────────────────────
  ms-mock:
    build:
      context: ./backend/ms-mock
      dockerfile: Dockerfile
    container_name: ms-mock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8085:8080"
    networks:
      colegio-network:
        aliases:
          - ms-comunicaciones
          - ms-asistencia

  # ─────────────────────────────────────────────────────────
  # MS-USUARIO
  # ─────────────────────────────────────────────────────────
  ms-usuario:
    build:
      context: ./backend/ms-usuario
      dockerfile: Dockerfile
    container_name: ms-usuario
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/colegio_db
      DB_USERNAME: colegio
      DB_PASSWORD: colegio123
      JWT_SECRET: colegio-bernardo-ohiggins-secret-key-2024-duoc-fs3-very-long-secret
      LOGGING_LEVEL_CL_DUOC_COLEGIO_USUARIO: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_FILTER_COMMONSREQUESTLOGGINGFILTER: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_SERVLET: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    ports:
      - "8083:8083"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # MS-ACADÉMICO
  # ─────────────────────────────────────────────────────────
  ms-academico:
    build:
      context: ./backend/ms-academico
      dockerfile: Dockerfile
    container_name: ms-academico
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/colegio_db
      DB_USERNAME: colegio
      DB_PASSWORD: colegio123
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    ports:
      - "8082:8082"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # MS-BFF
  # ─────────────────────────────────────────────────────────
  ms-bff:
    build:
      context: ./backend/ms-bff
      dockerfile: Dockerfile
    container_name: ms-bff
    environment:
      SPRING_PROFILES_ACTIVE: docker
      COMUNICACIONES_URL: http://ms-comunicaciones:8080
      ASISTENCIA_URL: http://ms-asistencia:8080
    depends_on:
      ms-usuario:
        condition: service_healthy
      ms-academico:
        condition: service_healthy
      ms-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    ports:
      - "8084:8084"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: colegio-bernardo-ohiggins-secret-key-2024-duoc-fs3-very-long-secret
      FRONTEND_URL: http://localhost:3000
    depends_on:
      ms-usuario:
        condition: service_healthy
      ms-academico:
        condition: service_healthy
      ms-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    ports:
      - "8080:8080"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - colegio-network

volumes:
  postgres_test_data:

networks:
  colegio-network:
    name: colegio-network
    driver: bridge
