name: Tests & Coverage (JaCoCo)

on:
  push:
    branches: [develop, main, 'feature/**', 'fix/**']
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**' # 1. Agregamos tu ruta para que el push reaccione
      - 'backend/archetypes/**'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**' # 2. Agregamos tu ruta aquí también
      - '.github/workflows/**'

jobs:
  test-gateway:
    name: API Gateway — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn test --batch-mode

  test-usuario:
    name: MS-Usuario — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-usuario
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo report
        run: mvn test jacoco:report --batch-mode # Intacto, tal cual lo tenía él
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-usuario
          path: backend/ms-usuario/target/site/jacoco

  test-academico:
    name: MS-Academico — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-academico
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo report
        run: mvn test jacoco:report --batch-mode # Intacto, tal cual lo tenía él
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-academico
          path: backend/ms-academico/target/site/jacoco

  # 3. IMPLEMENTACIÓN DE TU PARTE INDEPENDIENTE CON SONARCLOUD
  test-comunicaciones:
    name: MS-Comunicaciones — Tests, JaCoCo & Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-comunicaciones
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requerido por SonarCloud para analizar el historial
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests, JaCoCo & Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=colegio-ohiggins-ms-comunicaciones \
            -Dsonar.organization=yaquelin2305 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_GLOBAL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-comunicaciones
          path: backend/ms-comunicaciones/target/site/jacoco