name: Tests (JaCoCo)

on:
  push:
    branches: [develop, main, 'feature/**', 'fix/**']
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**'
      - 'backend/ms-bff/**'
      - 'backend/archetypes/**'
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**'
      - 'backend/ms-bff/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  test-gateway:
    name: API Gateway — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests
        run: mvn clean verify

  test-usuario:
    name: MS-Usuario — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-usuario
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo
        run: mvn clean verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-usuario
          path: backend/ms-usuario/target/site/jacoco

  test-academico:
    name: MS-Academico — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-academico
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo
        run: mvn clean verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-academico
          path: backend/ms-academico/target/site/jacoco

  test-comunicaciones:
    name: MS-Comunicaciones — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-comunicaciones
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo
        run: mvn clean verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-comunicaciones
          path: backend/ms-comunicaciones/target/site/jacoco

  test-bff:
    name: MS-BFF — Tests & JaCoCo
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-bff
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & JaCoCo
        run: mvn clean verify
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-bff
          path: backend/ms-bff/target/site/jacoco

  test-frontend:
    name: Frontend — Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests & coverage
        run: npm run test:coverage
