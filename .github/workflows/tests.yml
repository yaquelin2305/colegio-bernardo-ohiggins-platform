name: Tests & Coverage (JaCoCo)

on:
  push:
    branches: [develop, main, 'feature/**', 'fix/**']
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**'
      - 'backend/archetypes/**'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/api-gateway/**'
      - 'backend/ms-academico/**'
      - 'backend/ms-usuario/**'
      - 'backend/ms-comunicaciones/**'
      - '.github/workflows/**'

jobs:
  test-gateway:
    name: API Gateway — Tests & Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests & Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=plataforma-colegio-ohiggins-oficial \
            -Dsonar.organization=yaquelin2305 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_GLOBAL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-usuario:
    name: MS-Usuario — Tests, JaCoCo & Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-usuario
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests, JaCoCo & Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=plataforma-colegio-ohiggins-oficial \
            -Dsonar.organization=yaquelin2305 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_GLOBAL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-usuario
          path: backend/ms-usuario/target/site/jacoco

  test-academico:
    name: MS-Academico — Tests, JaCoCo & Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-academico
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests, JaCoCo & Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=plataforma-colegio-ohiggins-oficial \
            -Dsonar.organization=yaquelin2305 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_GLOBAL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-academico
          path: backend/ms-academico/target/site/jacoco

  test-comunicaciones:
    name: MS-Comunicaciones — Tests, JaCoCo & Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-comunicaciones
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run tests, JaCoCo & Sonar Analysis
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=plataforma-colegio-ohiggins-oficial \
            -Dsonar.organization=yaquelin2305 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_GLOBAL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-comunicaciones
          path: backend/ms-comunicaciones/target/site/jacoco