# =============================================================
# DOCKER COMPOSE — Plataforma Colegio Bernardo O'Higgins
#
# Orden de arranque:
#   postgres-usuario → ms-usuario ─┐
#   postgres-academico → ms-academico ─┤→ api-gateway → frontend
#
# Comandos:
#   docker compose up --build        (primera vez o tras cambios)
#   docker compose up -d             (modo daemon)
#   docker compose down              (detener y eliminar contenedores)
#   docker compose down -v           (detener + borrar volúmenes BD)
#   docker compose logs -f api-gateway
# =============================================================

services:

  # ─────────────────────────────────────────────────────────
  # BD — MS-USUARIO  (puerto 5433 en host)
  # ─────────────────────────────────────────────────────────
  postgres-usuario:
    image: postgres:16-alpine
    container_name: usuario-db
    environment:
      POSTGRES_DB: usuario_db
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: usuario123
    volumes:
      - ./backend/ms-usuario/src/main/resources/db/init-usuario.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_usuario_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario -d usuario_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # BD — MS-ACADÉMICO  (puerto 5432 en host)
  # ─────────────────────────────────────────────────────────
  postgres-academico:
    image: postgres:16-alpine
    container_name: academico-db
    environment:
      POSTGRES_DB: academico_db
      POSTGRES_USER: academico
      POSTGRES_PASSWORD: academico123
    volumes:
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_academico_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academico -d academico_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # MS-USUARIO  (puerto 8083)
  # ─────────────────────────────────────────────────────────
  ms-usuario:
    build:
      context: ./backend/ms-usuario
      dockerfile: Dockerfile
    container_name: ms-usuario
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres-usuario:5432/usuario_db
      DB_USERNAME: usuario
      DB_PASSWORD: usuario123
      JWT_SECRET: colegio-bernardo-ohiggins-secret-key-2024-duoc-fs3-very-long-secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres-usuario:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    ports:
      - "8083:8083"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # MS-ACADÉMICO  (puerto 8082)
  # ─────────────────────────────────────────────────────────
  ms-academico:
    build:
      context: ./backend/ms-academico
      dockerfile: Dockerfile
    container_name: ms-academico
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres-academico:5432/academico_db
      DB_USERNAME: academico
      DB_PASSWORD: academico123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres-academico:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    ports:
      - "8082:8082"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # API GATEWAY  (puerto 8080)
  # Espera a que ambos MSs estén healthy
  # ─────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      # Perfil docker: rutas estáticas sin Eureka
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: colegio-bernardo-ohiggins-secret-key-2024-duoc-fs3-very-long-secret
      FRONTEND_URL: http://localhost:5173
    depends_on:
      ms-usuario:
        condition: service_healthy
      ms-academico:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    ports:
      - "8080:8080"
    networks:
      - colegio-network

  # ─────────────────────────────────────────────────────────
  # FRONTEND React/Vite  (puerto 3000 → Nginx)
  # Espera al Gateway
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # El front llama al Gateway — en Docker ambos están en el mismo host
        VITE_API_URL: http://localhost:8080
    container_name: frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - colegio-network

volumes:
  postgres_usuario_data:
  postgres_academico_data:

networks:
  colegio-network:
    name: colegio-network
    driver: bridge
